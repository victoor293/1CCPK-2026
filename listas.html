<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lista Encadeada Simples</title>
  <style>
    body{
        font-family: sans-serif;
        margin: 30px;
    }
    button{
        width: 150px;
    }
    input, button{
        margin: 5px;
        padding: 8px;
    }
    #saida{
        margin-top: 20px;
        padding: 15px;
        border: 1px, solid, #ccc;
    }
  </style>
</head>
<body>

    <h1>Lista Encadeada (versão simples)</h1>

    <input type="text" id="nome" placeholder="Digite um nome"><br>
    <button onclick="adicionarFim()">Adicionar no fim</button>
    <button onclick="adicionarInicio()">Adicionar no início</button>
    <button onclick="removerInicio()">Remover do início</button><br>
    <button onclick="contar()">Contar Elementos</button>
    <button onclick="mostrar()">Buscar nome</button>
    <button onclick="mostrar()">Mostrar Lista</button>

    <div id="saida"></div>

    <script>
    // "lista encadeada" simulada
    let valores = [];
    let proximo = [];

    let inicio = -1;
    let ultimo = -1;

    function adicionarFim() {
        let nome = document.getElementById("nome").value;
        if (nome === "") {
            alert("Digite um nome");
            return;
        }
        let novoIndice = valores.length;
        valores.push(nome);
        proximo.push(-1);

        if (inicio === -1) {
            inicio = novoIndice;
            ultimo = novoIndice;
        } else {
            proximo[ultimo] = novoIndice;
            ultimo = novoIndice;
        }

        document.getElementById("nome").value = "";
        mostrar();
    }

    function adicionarInicio() {
        let nome = document.getElementById("nome").value;
        if (nome === "") {
            alert("Digite um nome");
            return;
        }

        let novoIndice = valores.length;
        valores.push(nome);
        proximo.push(inicio);
        inicio = novoIndice;

        if(ultimo === -1){
            ultimo = novoIndice
        }

        document.getElementById("nome").value = "";
        mostrar();
    }

    function removerInicio(){
        if (inicio === -1) {
            resultado = "Lista vazia";
            return;
        }

        inicio = proximo[inicio];

        if(inicio===-1){
            ultimo = -1;
        }
        mostrar();
    }

    function buscar(){
        let nomeBusca = document.getElementById("nome").value;
        if (nome === "") {
            alert("Digite um nome");
            return;
        }
        let atual = inicio;
        let encontrou = false;
        while(atual!==-1){
            if(valores[atual]===nomeBusca){
                encontrou = true;
            }
            atual = proximo[atual];
        }

        if(encontrou){
            document.getElementById("saida").innerHTML = "Nome encontrado na lista";
        }
        else{
            document.getElementById("saida").innerHTML = "Nome não encontrado";
        }
    }

    function mostrar() {
        let resultado = "";
        let atual = inicio;

        while (atual !== -1) {
            resultado += valores[atual] + " → ";
            atual = proximo[atual];
        }
        
        if (inicio === -1) {
            resultado = "Lista vazia";
        }
        else{
            resultado += "null";
        }
        document.getElementById("saida").innerHTML = resultado;
    }
    </script>

</body>
</html>
